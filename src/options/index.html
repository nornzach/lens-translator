<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lens Translator 设置</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Lens Translator</h1>
        <p class="help" id="helpHotkey">
          按住快捷键显示矩形透镜中文，松开即消失；页面英文不会被替换。
        </p>
      </header>

      <form id="settings-form" class="form" autocomplete="off">
        <section class="card">
          <h2>API（OpenAI 兼容）</h2>
          <p id="configBadge" class="config-badge warn">状态：检测中…</p>
          <label>
            Base URL
            <input
              id="baseURL"
              name="baseURL"
              type="text"
              inputmode="url"
              spellcheck="false"
              placeholder="https://api.openai.com/v1"
            />
          </label>
          <label>
            API Key
            <input
              id="apiKey"
              name="apiKey"
              type="password"
              placeholder="sk-... 或供应商密钥"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
          <p class="hint">再次保存时若 Key 留空，将保留已保存的密钥（不会被清空）。</p>
          <label>
            模型
            <input id="model" name="model" type="text" placeholder="gpt-4o-mini" spellcheck="false" />
          </label>
        </section>

        <section class="card">
          <h2>语言与行为</h2>
          <div class="row">
            <label>
              源语言
              <input id="sourceLang" name="sourceLang" type="text" placeholder="en" />
            </label>
            <label>
              目标语言
              <input id="targetLang" name="targetLang" type="text" placeholder="zh" />
            </label>
          </div>
          <label class="checkbox">
            <input id="autoTranslate" name="autoTranslate" type="checkbox" />
            自动预译可见区域（关闭后仍可在透镜下按需翻译）
          </label>
          <label>
            透镜宽度（px）
            <input id="lensWidthPx" name="lensWidthPx" type="number" min="120" max="800" step="1" />
          </label>
        </section>

        <section class="card">
          <h2>快捷键</h2>
          <p class="hint">点击「录制」后按下组合键。Mac 上 Option 即 Alt。</p>
          <div class="hotkey-capture">
            <span id="hotkeyPreview" class="hotkey-preview">Option+Shift+L</span>
            <button type="button" id="captureHotkey" class="btn">录制快捷键</button>
          </div>
          <input type="hidden" id="hotkeyAlt" />
          <input type="hidden" id="hotkeyShift" />
          <input type="hidden" id="hotkeyCtrl" />
          <input type="hidden" id="hotkeyMeta" />
          <input type="hidden" id="hotkeyCode" />
          <p id="captureHint" class="hint capture-hint" hidden>请按下快捷键…（Esc 取消）</p>
        </section>

        <section class="card">
          <h2>暂停的网站</h2>
          <label>
            主机名，逗号分隔
            <input
              id="pausedHostnames"
              name="pausedHostnames"
              type="text"
              placeholder="example.com, news.ycombinator.com"
            />
          </label>
        </section>

        <div class="actions">
          <button type="submit" id="save" class="btn primary">保存</button>
          <button type="button" id="reset" class="btn">恢复默认</button>
          <span id="status" class="status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lens Translator 快捷控制</title>
    <link rel="stylesheet" href="../shared/ui-tokens.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button class="orb" id="orb" type="button" title="展开 Lens Translator">
      <span class="orb-icon" data-icon="languages"></span>
      <span class="orb-state" id="orbState"></span>
    </button>

    <main class="panel" aria-label="Lens Translator 快捷控制">
      <header class="header">
        <div class="brand-mark"><span data-icon="languages"></span></div>
        <div class="brand-copy">
          <strong>Lens Translator</strong>
          <span id="connectionState">正在读取设置</span>
        </div>
        <button class="icon-button" id="pin" type="button" title="固定面板" aria-pressed="false">
          <span data-icon="pin"></span>
        </button>
        <button class="icon-button" id="collapse" type="button" title="收起面板">
          <span data-icon="panel-close"></span>
        </button>
      </header>

      <div class="scroll-area">
        <section class="quick-actions" aria-label="翻译控制">
          <button class="action-button" id="pageAction" type="button">
            <span class="action-icon" data-icon="scan-text"></span>
            <span><strong>整页双语</strong><small id="pageActionState">已关闭</small></span>
          </button>
          <button class="action-button" id="lensAction" type="button">
            <span class="action-icon" data-icon="focus"></span>
            <span><strong>翻译透镜</strong><small id="lensActionState">已关闭</small></span>
          </button>
        </section>

        <section class="control-section engines">
          <div class="section-title"><span data-icon="bot"></span><strong>翻译引擎</strong></div>
          <div class="engine-row">
            <span>透镜</span>
            <div class="segmented" data-engine-scope="lens">
              <button type="button" data-engine="browser">Chrome</button>
              <button type="button" data-engine="external">外部 LLM</button>
            </div>
          </div>
          <div class="engine-row">
            <span>整页</span>
            <div class="segmented" data-engine-scope="page">
              <button type="button" data-engine="browser">Chrome</button>
              <button type="button" data-engine="external">外部 LLM</button>
            </div>
          </div>
        </section>

        <details class="collapsible">
          <summary>
            <span data-icon="palette"></span>
            <strong>译文样式</strong>
            <span data-icon="chevron"></span>
          </summary>
          <div class="collapsible-body">
            <div class="form-grid compact">
              <label class="field">
                <span>字体</span>
                <select id="fontFamily">
                  <option value="system">跟随页面</option>
                  <option value="sans">现代无衬线</option>
                  <option value="serif">阅读衬线</option>
                  <option value="mono">等宽字体</option>
                </select>
              </label>
              <label class="field size-field">
                <span>字号 <output id="fontSizeValue">14px</output></span>
                <input id="fontSize" type="range" min="10" max="32" step="1" />
              </label>
            </div>

            <div class="style-tools">
              <button class="format-button" id="bold" type="button" title="加粗" aria-pressed="false">B</button>
              <button class="format-button italic" id="italic" type="button" title="斜体" aria-pressed="false">I</button>
              <button class="format-button underline" id="underline" type="button" title="下划线" aria-pressed="false">U</button>
              <label class="color-tool" title="译文颜色">
                <input id="useTextColor" type="checkbox" />
                <span data-icon="type"></span>
                <input id="textColor" type="color" />
              </label>
              <label class="color-tool" title="译文背景">
                <input id="useBackground" type="checkbox" />
                <span data-icon="paint-bucket"></span>
                <input id="backgroundColor" type="color" />
              </label>
            </div>

            <div class="preview-shell">
              <span>预览</span>
              <p id="stylePreview">译文样式会即时应用到整页双语与透镜。</p>
            </div>
          </div>
        </details>

        <details class="collapsible">
          <summary>
            <span data-icon="key"></span>
            <strong>外部 LLM</strong>
            <span data-icon="chevron"></span>
          </summary>
          <div class="collapsible-body llm-fields">
            <label class="field full"><span>Base URL</span><input id="baseURL" type="url" autocomplete="url" /></label>
            <label class="field full"><span>API Key</span><input id="apiKey" type="password" autocomplete="new-password" /></label>
            <div class="form-grid">
              <label class="field"><span>模型</span><input id="model" type="text" autocomplete="off" /></label>
              <label class="field"><span>服务商</span>
                <select id="provider">
                  <option value="auto">自动识别</option>
                  <option value="openai">OpenAI</option>
                  <option value="deepseek">DeepSeek</option>
                  <option value="stepfun">StepFun</option>
                </select>
              </label>
            </div>
            <div class="llm-actions">
              <button class="secondary-button" id="testConnection" type="button"><span data-icon="activity"></span>测试</button>
              <button class="primary-button" id="saveLlm" type="button"><span data-icon="save"></span>保存</button>
            </div>
          </div>
        </details>
      </div>

      <footer>
        <span class="save-state" id="saveState" role="status" aria-live="polite"></span>
        <button class="footer-button" id="openSettings" type="button" title="打开完整设置">
          <span data-icon="settings"></span>完整设置
        </button>
      </footer>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>

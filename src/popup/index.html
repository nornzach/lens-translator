<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lens Translator 控制面板</title>
    <link rel="stylesheet" href="../shared/ui-tokens.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div class="brand">
          <span class="logo" aria-hidden="true">L</span>
          <div>
            <h1>Lens Translator</h1>
            <p class="subtitle" id="pairHint">多语言按需翻译</p>
          </div>
        </div>
      </header>

      <section class="card hotkey-card" aria-label="快捷键">
        <div class="row">
          <span class="label">透镜</span>
          <button type="button" class="hotkey-chip" id="copyLensHotkey" title="点击复制">
            <span id="hotkeyHint">—</span>
          </button>
        </div>
        <div class="row">
          <span class="label">整页</span>
          <button type="button" class="hotkey-chip" id="copyPageHotkey" title="点击复制">
            <span id="pageHotkeyHint">—</span>
          </button>
        </div>
        <p class="hint tight">点击扩展图标也可开关透镜 · 点击芯片复制快捷键</p>
      </section>

      <section class="card">
        <div class="row">
          <span class="label">当前站点</span>
          <span id="hostname" class="value mono">—</span>
        </div>
        <label class="switch-row">
          <span class="switch-text">暂停此站</span>
          <input id="pauseToggle" type="checkbox" class="switch" disabled />
        </label>
      </section>

      <section class="card">
        <div class="row">
          <span class="label">透镜引擎</span>
          <span id="apiStatus" class="pill">…</span>
        </div>
        <div class="row">
          <span class="label">整页引擎</span>
          <span id="pageEngineStatus" class="pill">…</span>
        </div>
        <label class="switch-row">
          <div class="switch-text-block">
            <span class="switch-text">划词翻译</span>
            <span class="switch-desc" id="selectionDesc">开：选中文字即显示译文</span>
          </div>
          <input id="selectionToggle" type="checkbox" class="switch" />
        </label>
        <label class="switch-row">
          <div class="switch-text-block">
            <span class="switch-text">自动预译可见区</span>
            <span class="switch-desc" id="modeDesc">关：仅透镜下的块才翻译</span>
          </div>
          <input id="autoToggle" type="checkbox" class="switch" />
        </label>
        <label class="switch-row">
          <div class="switch-text-block">
            <span class="switch-text">匹配源语言时自动整页</span>
            <span class="switch-desc" id="pageAutoDesc">关：使用快捷键手动开启</span>
          </div>
          <input id="pageAutoToggle" type="checkbox" class="switch" />
        </label>
      </section>

      <div class="actions">
        <button type="button" id="toggleLens" class="btn primary">
          <span id="toggleLensLabel">开启翻译透镜</span>
        </button>
        <button type="button" id="translatePage" class="btn secondary">
          <span>切换整页双语</span>
        </button>
        <button type="button" id="openOptions" class="btn ghost">
          <span>打开完整设置</span>
        </button>
      </div>

      <p id="unconfiguredTip" class="tip" hidden></p>
      <p id="error" class="error" hidden></p>
      <p id="copyToast" class="hint" hidden>已复制</p>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
